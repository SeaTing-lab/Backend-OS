# docker-compose.yml — HiveMQ Cloud edition (no local broker needed)
version: '3.9'

services:
  backend:
    build: .
    container_name: smart_home_backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3